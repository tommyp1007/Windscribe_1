workflows:
  windscribe-unsigned-ipa:
    name: Windscribe Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: Windscribe.xcodeproj
        XCODE_SCHEME: Windscribe-Release
        XCODE_CONFIGURATION: Production
    scripts:
      - name: Resolve Swift Package dependencies
        script: |
          set -e
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Build unsigned iOS app
        script: |
          set -e
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIGURATION" \
            -sdk iphoneos \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Package unsigned IPA
        script: |
          set -e
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -path "*/Build/Products/*-iphoneos/Windscribe.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "Windscribe.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Windscribe.app not found in DerivedData"
            find "$CM_BUILD_DIR/DerivedData" -name "*.app" -type d || true
            exit 1
          fi
          echo "Packaging app at: $APP_PATH"
          mkdir -p "$CM_BUILD_DIR/build/ipa/Payload"
          cp -R "$APP_PATH" "$CM_BUILD_DIR/build/ipa/Payload/"
          cd "$CM_BUILD_DIR/build/ipa"
          zip -qr Windscribe-unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ipa/Windscribe-unsigned.ipa
