workflows:
  windscribe-unsigned-ipa:
    name: Windscribe Unsigned IPA
    max_build_duration: 180
    instance_type: mac_mini_m2
    environment:
      # Windscribe CI pins Xcode 26.3; 26.4 can hit legacy-target + Realm build glitches.
      xcode: 26.3
      vars:
        XCODE_PROJECT: Windscribe.xcodeproj
        XCODE_SCHEME: Windscribe-Release
        XCODE_CONFIGURATION: Production
        DERIVED_DATA: $CM_BUILD_DIR/DerivedData
        GO_VERSION: "1.23.11"
    scripts:
      - name: Prepare build tools
        script: |
          set -e
          chmod +x build_wireguard_go_bridge.sh
      - name: Resolve Swift Package dependencies
        script: |
          set -e
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -derivedDataPath "$DERIVED_DATA"
      - name: Build WireGuard Go bridge
        script: |
          set -e
          BRIDGE_BUILD_DIR="$DERIVED_DATA/Build/Intermediates.noindex/Windscribe.build/Production-iphoneos/WireGuardGoBridgeiOS.build"
          mkdir -p "$BRIDGE_BUILD_DIR/tmp"
          export BUILD_DIR="$BRIDGE_BUILD_DIR"
          export CONFIGURATION_BUILD_DIR="$BRIDGE_BUILD_DIR"
          export CONFIGURATION_TEMP_DIR="$BRIDGE_BUILD_DIR/tmp"
          export SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          export PLATFORM_NAME=iphoneos
          export ARCHS=arm64
          ./build_wireguard_go_bridge.sh "$GO_VERSION"
      - name: Build unsigned iOS app
        script: |
          set -e
          # Serial builds avoid PBXLegacyTarget "target ended" races on CI.
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            -jobs 1 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Package unsigned IPA
        script: |
          set -e
          APP_PATH=$(find "$DERIVED_DATA" -path "*/Build/Products/*-iphoneos/Windscribe.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$DERIVED_DATA" -name "Windscribe.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Windscribe.app not found in DerivedData"
            find "$DERIVED_DATA" -name "*.app" -type d || true
            exit 1
          fi
          echo "Packaging app at: $APP_PATH"
          mkdir -p "$CM_BUILD_DIR/build/ipa/Payload"
          cp -R "$APP_PATH" "$CM_BUILD_DIR/build/ipa/Payload/"
          cd "$CM_BUILD_DIR/build/ipa"
          zip -qr Windscribe-unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ipa/Windscribe-unsigned.ipa
